# Backup configuration for the local rsync snapshot system.
#
# Edit these values before enabling the timer.

# Where snapshots are stored. Keep this on a different disk or mounted drive when
# possible. The default targets this /files2 volume.
BACKUP_DEST="/files2/backups/${HOSTNAME:-computer}"

# Paths to back up. Symlinked home directories are listed by their real
# /files1 targets so the backup captures the data, not only the symlinks.
# Running as your normal user can only back up files that user can read.
BACKUP_SOURCES=(
  "/home/ca"
  "/files1/Documents"
  "/files1/Sources"
  "/files1/Pictures"
  "/files1/Music"
  "/files1/Videos"
)

# Optional exclude file. Relative paths are resolved from the backup-system root.
EXCLUDE_FILE="config/excludes.txt"

# Keep the most recent N snapshots. Daily timer + 30 snapshots ~= 30 days.
RETAIN_SNAPSHOTS=30

# Refuse to start if the backup filesystem has less than this much free space
# after pre-run pruning. Accepts K, M, G, or T suffixes.
MIN_FREE_SPACE="50G"

# Use one filesystem per source. This avoids accidentally traversing mounted
# network shares, external drives, VM images mounted elsewhere, etc.
ONE_FILE_SYSTEM=true

# Extra rsync options can be added here if needed.
RSYNC_EXTRA_OPTS=()
