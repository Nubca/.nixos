# Backup configuration for the Win11-Trading VM.
#
# This backup intentionally runs separately from the daily user-data backup.
# It must be run as root because libvirt image and firmware state live under
# /var/lib/libvirt.

VM_NAME="Win11-Trading"
VM_BACKUP_DEST="/files2/backups/vms/${VM_NAME}"
VM_RETAIN_SNAPSHOTS=2

VM_DISK="/var/lib/libvirt/images/Win11-Trading.raw"
VM_NVRAM="/var/lib/libvirt/qemu/nvram/Win11-Trading_VARS.fd"
VM_XML="/home/ca/.nixos/vms/trading/config.xml"

# If the VM is running, the scheduled timer logs a skip and exits successfully.
# Set this to false if you prefer a failed unit whenever the VM is on.
VM_SKIP_RUNNING=true

# Optional extra state. Leave missing paths here; the script will log and skip
# them. Add TPM or app-specific exports once confirmed.
VM_OPTIONAL_PATHS=(
  "/var/lib/libvirt/swtpm/Win11-Trading"
)
